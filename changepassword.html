<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="msg"></div>
    <a href="userdetail.html" class="backtologin">
        <i class="fa-solid fa-arrow-left"></i>
         <span class="backtext">Back to Home</span>
    </a>
    <div class="card1">
        <h1>Change Password</h1>
         <div class="field">
        <label>Current Password</label>
        <div class="inputbox">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="••••••••" id="spassword">
        </div>
    </div>
  
     <div class="field">
        <label>New Password</label>
        <div class="inputbox">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="••••••••" id="newpassword">
        </div>
    </div>

     <div class="field">
        <label>Confirm Password</label>
        <div class="inputbox">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="••••••••" id="cpassword">
        </div>
    </div>

    <button onclick="changepassword()">Change Password</button>
    </div>
   <script>
      let API="http://127.0.0.1:5000/user"

      async function changepassword(){

     let spassword1=document.getElementById("spassword").value;
     let newpassword1=document.getElementById("newpassword").value
     let cpassword1=document.getElementById("cpassword").value
     if (newpassword1 !== cpassword1) {
        document.getElementById("msg").innerHTML = "Passwords do not match";
        return;
    }
     const response=await fetch(`${API}/changepassword`,{
        
         method:"POST",
         credentials:"include",
         headers:{ "Content-Type":"application/json"},
         body:JSON.stringify({spassword1,newpassword1})
     })
    const data=await response.json();
    document.getElementById("msg").innerHTML=data.message;
        if(data.message=="Password changed successfully"){
            window.location.href="userdetail.html"
         }

}
   </script>
</body>
</html>
